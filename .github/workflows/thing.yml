name: Build Kernel (MT6765)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: oppo-source/android_kernel_oppo_mt6765
          ref: oppo/mt6765_r_11.1.4_a16

      - name: Auto dummy missing Kconfig sources
        run: |
          # Collect all unique source paths from all Kconfig* files
          find . -name "Kconfig*" -type f -exec grep -E 'source\s+"[^"]+"' {} \; 2>/dev/null | \
            sed 's/.*source\s+"\([^"]*\)".*/\1/' | \
            sort -u | \
            while read -r src_path; do
              # Skip invalid or dangerous paths
              if [[ "$src_path" == *".."* ]] || \
                 [[ "$src_path" == "Kconfig"* ]] || \
                 [[ "$src_path" =~ ^\. ]] || \
                 [[ "$src_path" == "" ]]; then
                continue
              fi
              
              # Check if the source file exists
              if [[ ! -f "$src_path" ]]; then
                echo "Creating dummy: $src_path"
                src_dir=$(dirname "$src_path")
                
                # Skip if directory is current or parent
                if [[ "$src_dir" == "." ]] || [[ "$src_dir" == ".." ]]; then
                  continue
                fi
                
                # Remove existing directory and create fresh dummy
                rm -rf "$src_dir" 2>/dev/null || true
                mkdir -p "$src_dir"
                touch "$src_path"
              fi
            done

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: ./
          config: oppo6765_defconfig
          arch: arm64
          android-version: 11
          aosp-gcc: true
          aosp-clang: true
          aosp-clang-version: r383902
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
