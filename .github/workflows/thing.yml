name: thing

on:
  workflow_dispatch:
    inputs:
      link:
        description: PixelDrain Link
        required: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y jq unrar
      - id: id
        run: |
          ID=$(echo "${{ github.event.inputs.link }}" | grep -oP '(?<=/u/)[a-zA-Z0-9]+' | head -1)
          echo "id=$ID" >> $GITHUB_OUTPUT
      - name: Get filename
        id: file
        run: |
          URL="https://pixeldrain.com/api/file/${{ steps.id.outputs.id }}?download"
          FILENAME=$(curl -sI "$URL" | grep -i "content-disposition" | grep -oP 'filename="\K[^"]+')
          echo "name=$FILENAME" >> $GITHUB_OUTPUT
      - name: Download with curl progress bar
        run: |
          URL="https://pixeldrain.com/api/file/${{ steps.id.outputs.id }}?download"
          curl -L --progress-bar -o "${{ steps.file.outputs.name }}" "$URL"
      - name: Extract RAR file
        run: |
          unrar x "${{ steps.file.outputs.name }}" extracted/
      - name: Find and upload all files ≤10MB
        uses: actions/upload-artifact@v4
        with:
          name: small-files
          path: |
            extracted/**/*
          retention-days: 90
        continue-on-error: true
