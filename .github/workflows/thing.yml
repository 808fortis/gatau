name: Build Kernel (MT6765)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        repository: oppo-source/android_kernel_oppo_mt6765
        ref: oppo/mt6765_r_11.1.4_a16

    - name: Setup dependencies
      run: |
        sudo apt update
        sudo apt install -y git make gcc g++ bc bison flex libssl-dev cpio python3 python3-dev python3-pip wget unzip

    - name: Some fixes
      run: |
        sed -i 's|source block/foreground_io_opt/Kconfig|source block/foreground_io_opt|g' block/Kconfig

    - name: Setup toolchain
      run: |
        mkdir -p toolchain
        cd toolchain
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-11.0.0_r46/clang-r383902.tar.gz
        mkdir -p clang
        tar -xzf clang-r383902.tar.gz -C clang
        wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/master.tar.gz
        mkdir -p gcc
        tar -xzf master.tar.gz -C gcc
        echo "${GITHUB_WORKSPACE}/toolchain/clang/bin" >> $GITHUB_PATH
        echo "${GITHUB_WORKSPACE}/toolchain/gcc/bin" >> $GITHUB_PATH

    - name: Build kernel
      run: |
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-android-
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        make clean
        make oppo6765_defconfig
        make -j$(nproc)

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: arch/arm64/boot/Image.gz-dtb

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        files: arch/arm64/boot/Image.gz-dtb
        name: Kernel Build ${{ github.run_number }}
        tag_name: build-${{ github.run_number }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
