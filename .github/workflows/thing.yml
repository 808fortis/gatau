name: Build Kernel (MT6765)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout kernel
        uses: actions/checkout@v4
        with:
          repository: oppo-source/android_kernel_oppo_mt6765
          ref: oppo/mt6765_r_11.1.4_a16
          path: kernel

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libwxgtk3.0-gtk3-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev device-tree-compiler python-is-python3 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Setup Clang
        uses: ZyCromerZ/clang@main
        with:
          version: r383902
          path: clang

      - name: Fix Kconfig paths
        run: |
          cd kernel
          find . -type f -name "Kconfig*" | while read f; do
            grep -E '^[[:space:]]*source[[:space:]]+"[^"]+"' "$f" | sed -E 's/^[[:space:]]*source[[:space:]]+"([^"]+)".*/\1/' | while read p; do
              if [ -f "$p" ]; then
                d=$(dirname "$p")
                b=$(basename "$p")
                rm -rf "$p"
                mkdir -p "$d"
                touch "$d/$b"
              fi
            done
          done

      - name: Fix defconfig for 64-bit
        run: |
          cd kernel
          if ! grep -q "CONFIG_64BIT=y" arch/arm64/configs/oppo6765_defconfig; then
            echo "CONFIG_64BIT=y" >> arch/arm64/configs/oppo6765_defconfig
          fi
          if ! grep -q "CONFIG_ARM64=y" arch/arm64/configs/oppo6765_defconfig; then
            echo "CONFIG_ARM64=y" >> arch/arm64/configs/oppo6765_defconfig
          fi

      - name: Build kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export READELF=llvm-readelf
          export OBJSIZE=llvm-size
          export STRIP=llvm-strip

          cd kernel
          rm -rf out
          make O=out ARCH=arm64 oppo6765_defconfig
          sed -i 's/# CONFIG_64BIT is not set/CONFIG_64BIT=y/' out/.config
          echo "CONFIG_64BIT=y" >> out/.config
          make O=out ARCH=arm64 olddefconfig
          make -j$(nproc) O=out ARCH=arm64

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: |
            kernel/out/arch/arm64/boot/Image.gz
            kernel/out/arch/arm64/boot/Image-gz.dtb
