name: Build Kernel
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - run: |
        sudo apt update
        sudo apt install -y bc bison flex libssl-dev make

    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        repository: oppo-source/android_kernel_oppo_mt6765
        ref: oppo/mt6765_r_11.1.4_a16
        path: kernel

    - name: Fix Kconfig sources
      run: |
        cd kernel
        find . -type f -name "Kconfig*" | while read f; do
          grep -E '^[[:space:]]*source[[:space:]]+"[^"]+"' "$f" | sed -E 's/^[[:space:]]*source[[:space:]]+"([^"]+)".*/\1/' | while read p; do
            if [ -f "$p" ]; then
              d=$(dirname "$p")
              b=$(basename "$p")
              echo "Converting: $p -> $d/$b"
              rm -rf "$p"
              mkdir -p "$d"
              touch "$d/$b"
            fi
          done
        done

    - run: |
        mkdir -p tc
        cd tc
        git clone --depth=1 -b android11-release https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-repo
        mv clang-repo/clang-r383902 clang
        git clone --depth=1 -b android11-release https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc

    - run: |
        export ARCH=arm64
        export CROSS_COMPILE=$PWD/tc/gcc/bin/aarch64-linux-android-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export PATH=$PWD/tc/clang/bin:$PATH
        export KCFLAGS="-fcommon"
        export HOSTCFLAGS="-fcommon"
        export KBUILD_HOSTCFLAGS="-fcommon"
        cd kernel
        echo "HOSTCFLAGS += -fcommon" >> Makefile
        make oppo6765_defconfig
        make -j$(nproc) HOSTCFLAGS="-fcommon" KBUILD_HOSTCFLAGS="-fcommon" CC=clang LLVM=1 LLVM_IAS=0 CFLAGS_KERNEL="-D__LINUX_ARM_ARCH__=8" Image.gz-dtb

    - uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: kernel/arch/arm64/boot/Image.gz-dtb
