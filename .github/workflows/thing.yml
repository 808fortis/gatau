name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clone Kernel Source
      run: git clone --depth=1 -b surya-q-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git kernel

    - name: Setup Dependencies
      run: |
        sudo apt update
        sudo apt install -y git make gcc g++ bc bison flex libssl-dev cpio python3 python3-dev python3-pip wget unzip

    - name: Setup Toolchain
      run: |
        wget https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/master.tar.gz
        mkdir -p kernel/toolchain
        tar -xzf master.tar.gz -C kernel/toolchain
        echo "${GITHUB_WORKSPACE}/kernel/toolchain/bin" >> $GITHUB_PATH

    - name: Build Kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-android-
        make clean
        make vendor/atoll_defconfig
        make -j$(nproc)

    - name: Upload Image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: kernel/arch/arm64/boot/Image.gz-dtb
