name: Build Kernel (MT6765)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: oppo-source/android_kernel_oppo_mt6765
          ref: oppo/mt6765_r_11.1.4_a16

      - name: Fix Kconfig
        run: |
          find . -type f -name "Kconfig*" | while read f; do
            grep -E '^[[:space:]]*source[[:space:]]+"[^"]+"' "$f" | sed -E 's/^[[:space:]]*source[[:space:]]+"([^"]+)".*/\1/' | while read p; do
              if [ -f "$p" ]; then
                d=$(dirname "$p")
                b=$(basename "$p")
                echo "Converting: $p -> $d/$b"
                rm -rf "$p"
                mkdir -p "$d"
                touch "$d/$b"
              fi
            done
          done

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: ./
          config: oppo6765_defconfig
          arch: arm64
          android-version: 11
          aosp-gcc: true
          aosp-clang: true
          aosp-clang-version: r487747c
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
