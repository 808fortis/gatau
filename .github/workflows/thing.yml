name: Build Kernel (MT6765)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: oppo-source/android_kernel_oppo_mt6765
          ref: oppo/mt6765_r_11.1.4_a16

      - name: Some fixes
        run: |
          rm -rf block/foreground_io_opt
          mkdir -p block/foreground_io_opt
          touch block/foreground_io_opt/Kconfig

          rm -rf mm/oppo_healthinfo
          mkdir -p mm/oppo_healthinfo
          touch mm/oppo_healthinfo/Kconfig

          rm -rf mm/multi_kswapd
          mkdir -p mm/multi_kswapd
          touch mm/multi_kswapd/Kconfig

          rm -rf mm/malloc_track
          mkdir -p mm/malloc_track/
          touch mm/malloc_track/Kconfig.compat
          
          rm -rf mm/task_mem
          mkdir -p mm/task_mem
          touch mm/task_mem/Kconfig
          
          rm -rf drivers/base/power/owakelock
          mkdir -p drivers/base/power/owakelock
          touch drivers/base/power/owakelock/Kconfig

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: ./
          config: oppo6765_defconfig
          arch: arm64
          android-version: 11
          aosp-gcc: true
          aosp-clang: true
          aosp-clang-version: r383902
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
