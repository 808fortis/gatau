name: thing

on:
  workflow_dispatch:
    inputs:
      link:
        description: PixelDrain Link
        required: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update && sudo apt-get install -y aria2
      - id: id
        run: echo "id=${GITHUB_EVENT_INPUTS_LINK#*'/u/'}" >> $GITHUB_OUTPUT
      - run: |
          curl -sI "https://pixeldrain.com/api/file/${{ steps.id.outputs.id }}?download" > headers.txt
          FILENAME=$(grep -i "content-disposition" headers.txt | sed -n 's/.*filename="\(.*\)".*/\1/p')
          aria2c -x 16 -s 16 -k 16M --out "$FILENAME" "https://pixeldrain.com/api/file/${{ steps.id.outputs.id }}?download"
      - env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          FILENAME=$(grep -i "content-disposition" headers.txt | sed -n 's/.*filename="\(.*\)".*/\1/p')
          curl -F "chat_id=$CHAT_ID" -F "document=@$FILENAME" "https://api.telegram.org/bot$TOKEN/sendDocument"
