name: Build Kernel (MT6765)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: oppo-source/android_kernel_oppo_mt6765
          ref: oppo/mt6765_r_11.1.4_a16
          path: kernel

      - name: Fix Kconfig paths
        run: |
          cd kernel
          find . -type f -name "Kconfig*" | while read f; do
            grep -E '^[[:space:]]*source[[:space:]]+"[^"]+"' "$f" | sed -E 's/^[[:space:]]*source[[:space:]]+"([^"]+)".*/\1/' | while read p; do
              if [ -f "$p" ]; then
                d=$(dirname "$p")
                b=$(basename "$p")
                rm -rf "$p"
                mkdir -p "$d"
                touch "$d/$b"
              fi
            done
          done

      - name: Fix defconfig
        run: |
          cd kernel
          if ! grep -q "CONFIG_64BIT=y" arch/arm64/configs/oppo6765_defconfig; then
            echo "CONFIG_64BIT=y" >> arch/arm64/configs/oppo6765_defconfig
          fi
          if ! grep -q "CONFIG_ARM64=y" arch/arm64/configs/oppo6765_defconfig; then
            echo "CONFIG_ARM64=y" >> arch/arm64/configs/oppo6765_defconfig
          fi

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: ./kernel/
          config: oppo6765_defconfig
          arch: arm64
          android-version: 11
          aosp-gcc: true
          aosp-clang: true
          aosp-clang-version: r383902
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
          extra-args: ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
