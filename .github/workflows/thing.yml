name: thing

on:
  workflow_dispatch:
    inputs:
      link:
        description: PixelDrain Link
        required: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update && sudo apt-get install -y aria2 jq
      - id: id
        run: |
          ID=$(echo "${{ github.event.inputs.link }}" | grep -oP '(?<=/u/)[a-zA-Z0-9]+' | head -1)
          echo "id=$ID" >> $GITHUB_OUTPUT
      - name: Get filename
        id: file
        run: |
          URL="https://pixeldrain.com/api/file/${{ steps.id.outputs.id }}?download"
          FILENAME=$(curl -sI "$URL" | grep -i "content-disposition" | grep -oP 'filename="\K[^"]+')
          echo "name=$FILENAME" >> $GITHUB_OUTPUT
      - run: |
          URL="https://pixeldrain.com/api/file/${{ steps.id.outputs.id }}?download"
          aria2c -x 16 -s 16 -k 16M --out "${{ steps.file.outputs.name }}" "$URL"
      - env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          curl -F "chat_id=$CHAT_ID" -F "document=@${{ steps.file.outputs.name }}" "https://api.telegram.org/bot$TOKEN/sendDocument"
